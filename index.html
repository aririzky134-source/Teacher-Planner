<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Planner 2026/2027 | Teacher Creator Academy</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta name="theme-color" content="#090909">

    <style>
        :root {
            --bg-main: #090909; --bg-card: #171717; --bg-hover: #222222;
            --primary-green: #5A9B33; --primary-green-hover: #488028;
            --accent-gold: #F4B41A; --text-primary: #FFFFFF; --text-secondary: #A1A1AA;
            --border: rgba(255, 255, 255, 0.08); --danger: #ef4444;
            --font-main: 'Inter', sans-serif;
            --radius-sm: 8px; --radius-md: 16px; --radius-lg: 24px;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background-color: var(--bg-main); color: var(--text-primary); overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }
        button, input, select, textarea { border: none; outline: none; background: none; font-family: inherit; }
        
        /* FIX: Memunculkan Icon Kalender di Dark Mode */
        input[type="date"]{
    background: #171717;
    color: #ffffff;
    color-scheme: dark;
}

input[type="date"]::-webkit-calendar-picker-indicator{
    filter: brightness(0) invert(1);
    opacity: 1;
    cursor: pointer;
}

input[type="date"]::-webkit-calendar-picker-indicator:hover{
    opacity: 1;
}

        h1 { font-size: clamp(1.5rem, 4vw, 2.5rem); font-weight: 700; letter-spacing: -0.02em; }
        h2 { font-size: clamp(1.25rem, 3vw, 1.5rem); font-weight: 600; letter-spacing: -0.01em; }
        p { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.6; }
        
        .btn { background-color: var(--primary-green); color: white; padding: 10px 20px; border-radius: var(--radius-sm); font-weight: 500; cursor: pointer; transition: var(--transition); display: inline-flex; align-items: center; gap: 8px; font-size:0.9rem;}
        .btn:hover { background-color: var(--primary-green-hover); }
        .btn-outline { background-color: transparent; border: 1px solid var(--border); color: var(--text-primary); }
        .btn-outline:hover { background-color: var(--bg-hover); border-color: var(--text-secondary); }
        .btn-danger { background-color: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-danger:hover { background-color: var(--danger); color: white; }
        
        .input-group { margin-bottom: 16px; text-align: left;}
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; color: var(--text-secondary); font-weight: 500; }
        .input-control { width: 100%; background: var(--bg-main); border: 1px solid var(--border); color: var(--text-primary); padding: 12px 16px; border-radius: var(--radius-sm); transition: var(--transition); }
        .input-control:focus { border-color: var(--primary-green); }

        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 24px; transition: var(--transition); }
        .screen { display: none; min-height: 100vh; animation: fadeIn 0.3s ease; }
        .screen.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Screens */
        #welcome-screen, #login-screen { flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .welcome-logo, .login-logo { width: 120px; margin-bottom: 24px; object-fit: contain; }
        .welcome-content, .login-card { max-width: 400px; width: 100%; }
        
        /* Dashboard */
        #dashboard-screen { flex-direction: row; align-items: stretch; }
        .sidebar { width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 16px; height: 100vh; position: sticky; top: 0; }
        .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);}
        .brand img { width: 40px; height: 40px; }
        .nav-menu { flex: 1; overflow-y: auto; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 12px; color: var(--text-secondary); border-radius: var(--radius-sm); cursor: pointer; font-size: 0.9rem; margin-bottom:4px;}
        .nav-item:hover, .nav-item.active { background: rgba(90, 155, 51, 0.1); color: var(--primary-green); font-weight: 500; }
        
        .main-content { flex: 1; display: flex; flex-direction: column; height: 100vh; overflow-y: auto; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; border-bottom: 1px solid var(--border); background: var(--bg-main); position: sticky; top: 0; z-index: 10; }
        .page-content { padding: 32px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap:16px;}
        
        /* Dynamic Table */
        .table-responsive { overflow-x: auto; width: 100%; }
        .data-table { width: 100%; border-collapse: collapse; text-align: left; white-space: nowrap; }
        .data-table th, .data-table td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .data-table th { color: var(--text-secondary); font-weight: 500; }
        
        /* Modal & Utilities */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); display: none; justify-content: center; align-items: center; z-index: 999; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-card); width: 100%; max-width: 500px; border-radius: var(--radius-md); padding: 24px; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        
        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--bg-card); border: 1px solid var(--border); padding: 16px 24px; border-radius: var(--radius-sm); display: flex; align-items: center; gap: 12px; transform: translateX(150%); transition: var(--transition); z-index: 1000; }
        .toast.show { transform: translateX(0); }
        .loading-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(9,9,9,0.8); display: none; justify-content: center; align-items: center; z-index: 9999; flex-direction: column; }
        .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        @media (max-width: 768px) {
            #dashboard-screen { flex-direction: column; }
            .sidebar { display: none; width: 100%; height: auto; position: static;}
            .sidebar.mobile-open { display: flex; }
            .header { padding: 16px; }
            .page-content { padding: 16px; }
        }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div><p style="margin-top:16px;">Memproses...</p></div>
    <div class="toast" id="toastBox"><i class="fas fa-info-circle" style="color:var(--primary-green)"></i><span id="toastMessage"></span></div>

    <div class="modal-overlay" id="formModalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Data</h3>
                <button class="btn-outline" style="padding:4px 8px;" onclick="app.closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="dynamicForm" onsubmit="app.saveData(event)">
                <div id="modalFormContent"></div>
                <div style="display:flex; justify-content:flex-end; gap:8px; margin-top:24px;">
                    <button type="button" class="btn btn-outline" onclick="app.closeModal()">Batal</button>
                    <button type="submit" class="btn">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <main class="screen active" id="welcome-screen">
        <img src="" alt="TCA Logo" class="welcome-logo" id="welcomeLogo">
        <div class="welcome-content">
            <h1>Selamat datang di</h1>
            <h1>Teacher Planner 2026/2027</h1>
            <br> </br>
            <p>Sistem perencanaan terintegrasi khusus untuk Guru Kreatif Indonesia.</p>
            <br> <br>
            <button class="btn" onclick="app.navigate('login-screen')">Mulai Sekarang <i class="fas fa-arrow-right"></i></button>
        </div>
    </main>

    <main class="screen" id="login-screen">
        <div class="card login-card">
            <h2>Portal Cikgu</h2><br>
            <form onsubmit="app.handleLogin(event)">
                <div class="input-group"><label>Nama Lengkap</label><input type="text" class="input-control" id="loginName" required placeholder="Budi Santoso S.Pd"></div>
                <div class="input-group"><label>Email (Penting untuk Workspace Data)</label><input type="email" class="input-control" id="loginEmail" required placeholder="Teachercreator@gmail.com"></div>
                <div class="input-group"><label>Kode Akses</label><input type="password" class="input-control" id="loginCode" required placeholder="Masukkan Kode Akses"></div>
                <button type="submit" class="btn" style="width:100%; justify-content:center;">Klik disini CIkgu!</button>
            </form>
        </div>
    </main>

    <main class="screen" id="dashboard-screen">
        <aside class="sidebar" id="sidebar">
            <div class="brand">
                <img src="" alt="Logo" id="sidebarLogo">
                <div><h3 style="font-size:1rem;">Teacher Planner</h3><span style="font-size:0.75rem; color:var(--text-secondary)">By Teacher Creator Academy</span></div>
            </div>
            <ul class="nav-menu" id="navMenu">
                </ul>
        </aside>

        <div class="main-content">
            <header class="header">
                <button class="btn-outline" style="padding:8px 12px; display:none;" id="mobileToggle" onclick="document.getElementById('sidebar').classList.toggle('mobile-open')"><i class="fas fa-bars"></i></button>
                <div style="font-weight:500;" id="headerTitle">Dashboard Overview</div>
                <div style="display:flex; gap:12px; align-items:center;">
                    <span id="userNameDisplay" style="font-size:0.9rem; color:var(--text-secondary);"></span>
                    <button class="btn btn-outline" style="padding:6px 12px; font-size:0.8rem;" onclick="app.logout()">Logout</button>
                </div>
            </header>
            <div class="page-content" id="contentArea"></div>
        </div>
    </main>

    <script>
        const LOGO_URL = "assets/logo-tca.png"; 
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8CvNXuyOkbIBfZ1J5RVQdwIyYfJltoC-iC7XnNZEvasP3oeFa18jDfYAlGBqmgDvq/exec"; // <--- PASTE URL WEB APP ANDA DISINI
        
        const app = {
            user: { name: null, email: null, safeEmail: null },
            activeYear: '2026-2027', // Tetap ada di sistem backend tapi tidak di UI
            activeModule: 'overview',
            editingId: null,

            // DYNAMIC MODULE DEFINITIONS
            modules: {
                overview: { icon: 'fa-border-all', title: 'Dashboard', render: 'custom' },
                kalender: { icon: 'fa-calendar-alt', title: 'Kalender Pendidikan', 
                    fields: [ {id: 'tanggal', label: 'Tanggal', type: 'date'}, {id: 'judul', label: 'Nama Kegiatan', type: 'text'}, {id: 'kategori', label: 'Kategori', type: 'select', options: ['Akademik','Administrasi','Rapat','Pribadi']} ]
                },
                target: { icon: 'fa-bullseye', title: 'Target Mengajar', 
                    fields: [ {id: 'judul', label: 'Judul Target', type: 'text'}, {id: 'deskripsi', label: 'Deskripsi', type: 'text'}, {id: 'deadline', label: 'Deadline', type: 'date'}, {id: 'progress', label: 'Progress (%)', type: 'number'} ]
                },
                jadwal: { icon: 'fa-clock', title: 'Jadwal Mengajar', 
                    fields: [ {id: 'hari', label: 'Hari', type: 'select', options: ['Senin','Selasa','Rabu','Kamis','Jumat','Sabtu']}, {id: 'jam', label: 'Jam (cth: 07:00-08:30)', type: 'text'}, {id: 'mapel', label: 'Mata Pelajaran', type: 'text'}, {id: 'kelas', label: 'Kelas', type: 'text'}, {id: 'ruang', label: 'Ruangan', type: 'text'} ]
                },
                todo: { icon: 'fa-check-square', title: 'To Do Guru', 
                    fields: [ {id: 'tugas', label: 'Tugas', type: 'text'}, {id: 'prioritas', label: 'Prioritas', type: 'select', options: ['Tinggi','Sedang','Rendah']}, {id: 'status', label: 'Status', type: 'select', options: ['Belum Selesai', 'Selesai']} ]
                },
                catatan: { icon: 'fa-sticky-note', title: 'Catatan Penting', 
                    fields: [ {id: 'judul', label: 'Judul Catatan', type: 'text'}, {id: 'kategori', label: 'Kategori', type: 'select', options: ['Pembelajaran','Siswa','Pribadi','Administrasi']}, {id: 'isi', label: 'Isi Catatan', type: 'textarea'} ]
                },
                rapat: { icon: 'fa-users', title: 'Agenda Rapat', 
                    fields: [ {id: 'nama', label: 'Nama Rapat', type: 'text'}, {id: 'tanggal', label: 'Tanggal', type: 'date'}, {id: 'lokasi', label: 'Lokasi', type: 'text'}, {id: 'hasil', label: 'Hasil/Tindak Lanjut', type: 'textarea'} ]
                },
                refleksi: { icon: 'fa-brain', title: 'Refleksi Mengajar', 
                    fields: [ {id: 'tanggal', label: 'Tanggal', type: 'date'}, {id: 'baik', label: 'Apa yang berjalan baik?', type: 'text'}, {id: 'kurang', label: 'Kendala / Perlu perbaikan?', type: 'text'} ]
                },
                konten: { icon: 'fa-lightbulb', title: 'Ide Konten Guru', 
                    fields: [ {id: 'ide', label: 'Judul Ide', type: 'text'}, {id: 'platform', label: 'Jenis', type: 'select', options: ['Reels','Carousel','Story','Webinar']}, {id: 'status', label: 'Status', type: 'select', options: ['Draft','Proses','Published']} ]
                }
            },

            init() {
                document.getElementById('welcomeLogo').src = LOGO_URL;
                document.getElementById('sidebarLogo').src = LOGO_URL;
                this.buildSidebar();
                
                if(window.innerWidth <= 768) document.getElementById('mobileToggle').style.display = 'block';

                const sessionStr = localStorage.getItem('tca_session_v2');
                if(sessionStr) {
                    this.user = JSON.parse(sessionStr);
                    document.getElementById('userNameDisplay').textContent = this.user.name;
                    this.navigate('dashboard-screen');
                    this.loadModule('overview');
                }
            },

            buildSidebar() {
                const ul = document.getElementById('navMenu');
                ul.innerHTML = '';
                for(let key in this.modules) {
                    const mod = this.modules[key];
                    ul.innerHTML += `<li class="nav-item" id="nav-${key}" onclick="app.loadModule('${key}')"><i class="fas ${mod.icon}"></i> ${mod.title}</li>`;
                }
            },

            handleLogin(e) {
                e.preventDefault();
                const code = document.getElementById('loginCode').value;
                if(code === 'TCA2026' || code === 'WebApp123') {
                    const email = document.getElementById('loginEmail').value;
                    const safeEmail = email.replace(/[.#$[\]]/g, '_'); // Wajib Firebase
                    this.user = { name: document.getElementById('loginName').value, email: email, safeEmail: safeEmail };
                    
                    localStorage.setItem('tca_session_v2', JSON.stringify(this.user));
                    document.getElementById('userNameDisplay').textContent = this.user.name;
                    
                    this.showToast('Login berhasil! Menyusun Workspace Anda...');
                    this.navigate('dashboard-screen');
                    this.loadModule('overview');
                } else {
                    this.showToast('Kode Akses Salah!', true);
                }
            },

            logout() { 
                localStorage.removeItem('tca_session_v2'); 
                location.reload(); 
            },

            navigate(id) { 
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); 
                document.getElementById(id).classList.add('active'); 
            },
            
            showToast(msg, err=false) { 
                const t=document.getElementById('toastBox'); 
                document.getElementById('toastMessage').innerText=msg; 
                t.style.borderLeftColor=err?'var(--danger)':'var(--primary-green)'; 
                t.classList.add('show'); 
                setTimeout(()=>t.classList.remove('show'),3000); 
            },
            
            showLoading(show) { 
                document.getElementById('loadingOverlay').style.display = show ? 'flex' : 'none'; 
            },

            // CORE ENGINE: Dinamis Load Data
            async loadModule(key) {
                this.activeModule = key;
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                document.getElementById(`nav-${key}`).classList.add('active');
                document.getElementById('headerTitle').textContent = this.modules[key].title;
                if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('mobile-open');
                
                const container = document.getElementById('contentArea');
                
                if (key === 'overview') {
                    container.innerHTML = `<div class="card"><div style="text-align:center; padding:40px;"><i class="fas fa-check-circle" style="font-size:3rem; color:var(--primary-green); margin-bottom:16px;"></i><h2>Halo ${this.user.name}!</h2><p>Semua menu disebelah kiri kini sudah terhubung ke database pribadi Anda (${this.user.email}). Silakan mulai mengisi data jadwal, tugas, atau kalender Anda.</p></div></div>`;
                    return;
                }

                container.innerHTML = `
                    <div class="section-header">
                        <h2>Data ${this.modules[key].title}</h2>
                        <button class="btn" onclick="app.openModal()"><i class="fas fa-plus"></i> Tambah Data</button>
                    </div>
                    <div class="card">
                        <div class="table-responsive">
                            <table class="data-table" id="dataTable">
                                <thead><tr id="tableHead"></tr></thead>
                                <tbody id="tableBody"><tr><td colspan="10" style="text-align:center">Memuat data dari server...</td></tr></tbody>
                            </table>
                        </div>
                    </div>
                `;

                const fields = this.modules[key].fields;
                const thRow = document.getElementById('tableHead');
                fields.forEach(f => thRow.innerHTML += `<th>${f.label}</th>`);
                thRow.innerHTML += `<th>Aksi</th>`;

                this.showLoading(true);
                const data = await this.fetchData(key);
                this.showLoading(false);

                const tBody = document.getElementById('tableBody');
                tBody.innerHTML = '';

                if(!data || Object.keys(data).length === 0) {
                    tBody.innerHTML = `<tr><td colspan="${fields.length + 1}" style="text-align:center; padding:32px; color:var(--text-secondary)"><i class="fas fa-folder-open" style="font-size:2rem; margin-bottom:10px;"></i><br>Belum ada data ${this.modules[key].title}.</td></tr>`;
                    return;
                }

                for(let id in data) {
                    const item = data[id];
                    let row = `<tr>`;
                    fields.forEach(f => { row += `<td>${item[f.id] || '-'}</td>`; });
                    row += `
                        <td>
                            <button class="btn-outline" style="padding:6px; font-size:12px; margin-right:4px;" onclick="app.deleteData('${key}', '${id}')"><i class="fas fa-trash" style="color:var(--danger)"></i></button>
                        </td>
                    </tr>`;
                    tBody.innerHTML += row;
                }
            },

            openModal() {
                this.editingId = null;
                const mod = this.modules[this.activeModule];
                document.getElementById('modalTitle').textContent = `Tambah ${mod.title}`;
                
                const form = document.getElementById('modalFormContent');
                form.innerHTML = '';
                
                mod.fields.forEach(f => {
                    let inputHtml = '';
                    if(f.type === 'select') {
                        let opts = f.options.map(o => `<option value="${o}">${o}</option>`).join('');
                        inputHtml = `<select id="field_${f.id}" class="input-control" required>${opts}</select>`;
                    } else if (f.type === 'textarea') {
                        inputHtml = `<textarea id="field_${f.id}" class="input-control" rows="3" required></textarea>`;
                    } else {
                        inputHtml = `<input type="${f.type}" id="field_${f.id}" class="input-control" required>`;
                    }
                    form.innerHTML += `<div class="input-group"><label>${f.label}</label>${inputHtml}</div>`;
                });
                
                document.getElementById('formModalOverlay').classList.add('active');
            },

            closeModal() { document.getElementById('formModalOverlay').classList.remove('active'); document.getElementById('dynamicForm').reset(); },

            async saveData(e) {
                e.preventDefault();
                const mod = this.modules[this.activeModule];
                let payload = {};
                
                mod.fields.forEach(f => { payload[f.id] = document.getElementById(`field_${f.id}`).value; });
                
                this.closeModal();
                this.showLoading(true);
                
                const url = `${APPS_SCRIPT_URL}?endpoint=${this.activeModule}&year=${this.activeYear}&email=${this.user.safeEmail}&action=create`;
                try {
                    const res = await fetch(url, { method: 'POST', body: JSON.stringify(payload) });
                    this.showLoading(false);
                    this.showToast('Data berhasil disimpan!');
                    this.loadModule(this.activeModule); 
                } catch(err) {
                    this.showLoading(false);
                    this.showToast('Gagal menyimpan ke server', true);
                }
            },

            async deleteData(endpoint, id) {
                if(confirm('Yakin menghapus data ini?')) {
                    this.showLoading(true);
                    const url = `${APPS_SCRIPT_URL}?endpoint=${endpoint}&year=${this.activeYear}&email=${this.user.safeEmail}&action=delete&id=${id}`;
                    try {
                        await fetch(url, { method: 'POST' });
                        this.showLoading(false);
                        this.showToast('Data dihapus!');
                        this.loadModule(this.activeModule); 
                    } catch(e) {
                        this.showLoading(false);
                        this.showToast('Gagal menghapus', true);
                    }
                }
            },

            // FIX: Tambahkan _t (Cache Buster) dan cache: 'no-store' agar tidak tertukar datanya
            async fetchData(endpoint) {
                if(APPS_SCRIPT_URL.includes("GANTI_DENGAN_URL")) { alert('TOLONG GANTI APPS_SCRIPT_URL DI KODE DENGAN URL WEB APP ANDA YANG ASLI AGAR DATABASE BERFUNGSI!'); return null; }
                
                // Tambahan "_t" memaksa browser mengunduh data segar setiap request, mengabaikan memori cache sebelumnya
                const url = `${APPS_SCRIPT_URL}?endpoint=${endpoint}&year=${this.activeYear}&email=${this.user.safeEmail}&_t=${new Date().getTime()}`;
                try {
                    const response = await fetch(url, { cache: 'no-store' });
                    const data = await response.json();
                    return data;
                } catch (error) {
                    console.error(error);
                    return null;
                }
            }
        };

        window.onload = () => app.init();
    </script>
</body>
</html>
